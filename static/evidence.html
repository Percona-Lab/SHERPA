<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Evidence — SHERPA</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<link rel="preload" as="image" href="/static/logo-small.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300..800;1,300..800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/tokens.css">
<link rel="stylesheet" href="/static/components.css">
<link rel="stylesheet" href="/static/header.css">
<style>
/* Account group row */
.account-group-row {
  background: var(--bg-muted);
  border-top: 1px solid var(--border);
  cursor: pointer;
  transition: background 120ms;
}
.account-group-row:hover { background: var(--bg-card-hover); }
.account-group-inner {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
}
.account-chevron {
  width: 16px; height: 16px;
  flex-shrink: 0;
  transition: transform 180ms;
  color: var(--text-muted);
}
.account-chevron.expanded { transform: rotate(90deg); }
.account-avatar {
  width: 28px; height: 28px;
  border-radius: 999px;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 700;
  color: white;
  flex-shrink: 0;
}
.evidence-indent td:first-child { padding-left: 56px; }
.evidence-quote {
  font-size: 12px;
  color: var(--text-secondary);
  font-style: italic;
  margin-top: 4px;
  padding-left: 10px;
  border-left: 2px solid var(--border-brand);
}
.churn-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 600;
  background: var(--tint-red);
  color: var(--red);
  border: 1px solid color-mix(in oklab, var(--red) 28%, transparent);
}
.churn-chip__dot {
  width: 6px; height: 6px;
  border-radius: 999px;
  background: var(--red);
}

/* Loading / empty */
.loading, .empty {
  text-align: center; padding: 80px 32px;
  color: var(--text-muted); font-size: 15px;
}
.loading .spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--brand-purple); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
<script>
(function(){var s=document.createElement('script');s.src='/rybbit/script.js';s.defer=true;
s.dataset.siteId=location.hostname.includes('staging')?'a0aeed07d55a':'7ecde10714bd';
document.head.appendChild(s);})();
</script>
</head>
<body>
<script src="/static/header.js"></script>

<main class="page page--wide">
  <!-- Page head -->
  <div class="page-head">
    <div class="page-head__title">
      <span class="t-eyebrow" style="color:var(--brand-purple)">The trail log</span>
      <h1 class="t-display">
        Evidence
        <span id="evidence-count" style="font-size:14px; font-weight:500; color:var(--text-muted); letter-spacing:0; margin-left:12px"></span>
      </h1>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="input search" style="width:280px">
      <svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="5"/><path d="m14 14-3-3"/></svg>
      <input id="search" placeholder="Search summaries, quotes, accounts...">
    </div>
    <div class="input" style="width:158px">
      <svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 4h11l-4 5v4l-3-1V9l-4-5Z"/></svg>
      <select id="filter-product">
        <option value="">All products</option>
      </select>
      <svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m4 6 4 4 4-4"/></svg>
    </div>
    <div class="input" style="width:158px">
      <select id="filter-source" onchange="renderTable()">
        <option value="">All sources</option>
      </select>
      <svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m4 6 4 4 4-4"/></svg>
    </div>
    <div class="input" style="width:168px">
      <select id="filter-sentiment">
        <option value="">All sentiment</option>
        <option value="Positive">Positive</option>
        <option value="Neutral">Neutral</option>
        <option value="Negative">Negative</option>
        <option value="Churn Signal">Churn Signal</option>
      </select>
      <svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m4 6 4 4 4-4"/></svg>
    </div>
    <div class="toolbar__sep"></div>
    <div class="seg">
      <button class="seg__btn" data-active="true" data-group="account">By account</button>
      <button class="seg__btn" data-group="flat">Flat list</button>
    </div>
    <button class="btn btn--subtle btn--sm" id="expandAllBtn" onclick="expandAll()">Expand all</button>
    <button class="btn btn--subtle btn--sm" id="collapseAllBtn" onclick="collapseAll()">Collapse all</button>
  </div>

  <!-- Table -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    Loading customer evidence...
  </div>
  <div id="tableContainer" style="display:none">
    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th id="th-first">Summary</th>
            <th style="width:140px">Product</th>
            <th style="width:110px">MRR</th>
            <th style="width:150px">Source</th>
            <th style="width:140px">Sentiment</th>
            <th style="width:100px">Date</th>
            <th style="width:130px">Contact</th>
          </tr>
        </thead>
        <tbody id="evidence-body"></tbody>
      </table>
    </div>
  </div>
  <div class="empty" id="empty" style="display:none">No evidence matches your filters.</div>
</main>

<script>
let allEvidence = [];
let groupBy = 'account';
let expandedAccounts = new Set();

const SENTIMENT_COLORS = {
  'Positive': 'var(--green)',
  'Neutral': 'var(--text-muted)',
  'Negative': 'var(--amber)',
  'Churn Signal': 'var(--red)',
};

function techBadgeHTML(tech) {
  var tc = TECH_COLORS[tech] || { color: 'var(--brand-purple)', tint: 'rgba(110,63,243,0.10)' };
  return '<span class="tech-badge" style="--_color:' + tc.color + '; --_tint:' + tc.tint + '">' +
    '<svg viewBox="0 0 12 11" fill="none" class="tech-badge__tri"><path d="M6 1.2 11.2 9.8 H0.8 Z" stroke="' + tc.color + '" stroke-width="1.4" stroke-linejoin="round" fill="' + tc.color + '" fill-opacity="0.18"/></svg>' +
    tech + '</span>';
}

function sentimentHTML(value) {
  var color = SENTIMENT_COLORS[value] || 'var(--text-muted)';
  return '<span class="sentiment" style="color:' + color + '">' +
    '<span class="sentiment__dot" style="background:' + color + '"></span> ' + esc(value) +
  '</span>';
}

function formatMrr(v) {
  if (v == null || v === 0) return '<span style="color:var(--text-muted)">&mdash;</span>';
  if (v >= 1000000) return '$' + (v / 1000000).toFixed(v >= 10000000 ? 0 : 1) + 'M';
  if (v >= 1000) return '$' + Math.round(v / 1000) + 'K';
  return '$' + v;
}

function relativeDate(dateStr) {
  if (!dateStr) return '—';
  var d = new Date(dateStr);
  var now = new Date();
  var days = Math.floor((now - d) / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return '1d ago';
  if (days < 7) return days + 'd ago';
  if (days < 30) return Math.floor(days / 7) + 'w ago';
  if (days < 365) return Math.floor(days / 30) + 'mo ago';
  return Math.floor(days / 365) + 'y ago';
}

async function loadData() {
  try {
    var res = await fetch('/api/sherpa/customer-evidence');
    var data = await res.json();
    allEvidence = (data.evidence || []).sort((a, b) => (b.mrr || 0) - (a.mrr || 0));
    populateFilters();
    renderTable();
  } catch (e) {
    document.getElementById('loading').innerHTML = '<p style="color:var(--red)">Failed to load: ' + e.message + '</p>';
  }
}

function populateFilters() {
  var products = [...new Set(allEvidence.map(e => e.product_line).filter(Boolean))].sort();
  var pSel = document.getElementById('filter-product');
  products.forEach(p => { var o = document.createElement('option'); o.value = p; o.textContent = p; pSel.appendChild(o); });

  // Source filter with counts
  var sourceCounts = {};
  allEvidence.forEach(e => { var s = e.source || 'Unknown'; sourceCounts[s] = (sourceCounts[s] || 0) + 1; });
  var sSel = document.getElementById('filter-source');
  Object.keys(sourceCounts).sort().forEach(s => {
    var o = document.createElement('option');
    o.value = s;
    o.textContent = s + ' (' + sourceCounts[s] + ')';
    sSel.appendChild(o);
  });
}

function getFiltered() {
  var product = document.getElementById('filter-product').value;
  var source = document.getElementById('filter-source').value;
  var sentiment = document.getElementById('filter-sentiment').value;
  var search = document.getElementById('search').value.toLowerCase();
  return allEvidence.filter(e => {
    if (product && e.product_line !== product) return false;
    if (source && e.source !== source) return false;
    if (sentiment && e.sentiment !== sentiment) return false;
    if (search && !(e.summary || '').toLowerCase().includes(search) && !(e.account_name || '').toLowerCase().includes(search) && !(e.verbatim || '').toLowerCase().includes(search)) return false;
    return true;
  });
}

function groupByAccount(filtered) {
  var m = new Map();
  filtered.forEach(function(e) {
    var key = e.account_name || 'Unknown';
    if (!m.has(key)) m.set(key, []);
    m.get(key).push(e);
  });
  return Array.from(m, function(entry) { return { account: entry[0], items: entry[1] }; })
    .sort(function(a, b) { return (b.items[0].mrr || 0) - (a.items[0].mrr || 0); });
}

function renderTable() {
  var filtered = getFiltered();
  var loading = document.getElementById('loading');
  var empty = document.getElementById('empty');
  var container = document.getElementById('tableContainer');

  loading.style.display = 'none';
  document.getElementById('evidence-count').textContent = filtered.length + ' of ' + allEvidence.length;

  // Show/hide expand/collapse buttons
  document.getElementById('expandAllBtn').style.display = groupBy === 'account' ? '' : 'none';
  document.getElementById('collapseAllBtn').style.display = groupBy === 'account' ? '' : 'none';

  // Update first th
  document.getElementById('th-first').textContent = groupBy === 'account' ? 'Summary' : 'Account / Summary';

  if (filtered.length === 0) {
    container.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  container.style.display = '';

  var tbody = document.getElementById('evidence-body');

  if (groupBy === 'account') {
    var groups = groupByAccount(filtered);
    tbody.innerHTML = groups.map(function(g) {
      var totalMRR = g.items[0].mrr || 0;
      var products = [...new Set(g.items.map(i => i.product_line).filter(Boolean))];
      var hasChurn = g.items.some(i => i.sentiment === 'Churn Signal');
      var isExpanded = expandedAccounts.has(g.account);
      var initials = g.account.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();

      // Group header row
      var html = '<tr class="account-group-row" onclick="toggleAccount(\'' + esc(g.account).replace(/'/g, "\\'") + '\')">' +
        '<td colspan="7" style="padding:0"><div class="account-group-inner">' +
          '<svg class="account-chevron' + (isExpanded ? ' expanded' : '') + '" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m6 4 4 4-4 4"/></svg>' +
          '<span class="account-avatar" style="background:' + (hasChurn ? 'var(--red)' : 'var(--brand-purple)') + '">' + initials + '</span>' +
          '<span style="font-weight:650;font-size:14px">' + esc(g.account) + '</span>' +
          '<span style="font-size:12px;color:var(--text-muted)">' + g.items.length + ' record' + (g.items.length === 1 ? '' : 's') + '</span>' +
          '<div style="display:flex;gap:4px;margin-left:8px">' +
            products.slice(0, 3).map(function(p) { return techBadgeHTML(p); }).join('') +
          '</div>' +
          '<span style="flex:1"></span>' +
          (hasChurn ? '<span class="churn-chip"><span class="churn-chip__dot"></span>Churn risk</span>' : '') +
          '<span class="t-mono" style="color:var(--green);font-weight:600;font-size:14px">' + formatMrr(totalMRR) + '</span>' +
          '<span style="font-size:12px;color:var(--text-muted)">' + relativeDate(g.items[0].date_captured) + '</span>' +
        '</div></td></tr>';

      // Evidence rows (if expanded)
      if (isExpanded) {
        g.items.forEach(function(e) {
          html += evidenceRowHTML(e, true);
        });
      }

      return html;
    }).join('');
  } else {
    // Flat list
    tbody.innerHTML = filtered.map(function(e) {
      return '<tr>' +
        '<td>' +
          '<div style="font-weight:600">' + esc(e.account_name) + '</div>' +
          '<div style="font-size:13px;color:var(--text-secondary)">' + esc(e.summary) + '</div>' +
        '</td>' +
        '<td>' + (e.product_line ? techBadgeHTML(e.product_line) : '') + '</td>' +
        '<td><span class="t-mono" style="color:var(--green);font-weight:600">' + formatMrr(e.mrr) + '</span></td>' +
        '<td><span style="font-size:12px">' + esc(e.source) + '</span></td>' +
        '<td>' + sentimentHTML(e.sentiment) + '</td>' +
        '<td style="font-size:12px;color:var(--text-muted)">' + relativeDate(e.date_captured) + '</td>' +
        '<td style="font-size:12px">' + esc(e.contact) + '</td>' +
      '</tr>';
    }).join('');
  }
}

function evidenceRowHTML(e, indented) {
  var quoteText = e.quote || e.verbatim || '';
  var quoteHTML = quoteText ? '<div class="evidence-quote">"' + esc(quoteText.substring(0, 200)) + (quoteText.length > 200 ? '...' : '') + '"</div>' : '';
  var sourceHTML = e.source_url
    ? '<a href="' + esc(e.source_url) + '" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--text-secondary)" onclick="event.stopPropagation()">' + esc(e.source) +
      ' <svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3H3v10h10v-3M9 3h4v4M13 3 7 9"/></svg></a>'
    : '<span style="font-size:12px;color:var(--text-secondary)">' + esc(e.source) + '</span>';

  return '<tr class="' + (indented ? 'evidence-indent' : '') + '">' +
    '<td' + (indented ? ' style="padding-left:56px"' : '') + '>' +
      '<div style="font-size:13px;color:var(--text-primary);margin-bottom:2px">' + esc(e.summary) + '</div>' +
      quoteHTML +
    '</td>' +
    '<td>' + (e.product_line ? techBadgeHTML(e.product_line) : '') + '</td>' +
    '<td><span class="t-mono" style="color:var(--green);font-weight:600">' + formatMrr(e.mrr) + '</span></td>' +
    '<td>' + sourceHTML + '</td>' +
    '<td>' + sentimentHTML(e.sentiment) + '</td>' +
    '<td style="font-size:12px;color:var(--text-muted)">' + relativeDate(e.date_captured) + '</td>' +
    '<td style="font-size:12px;color:var(--text-secondary)">' + esc(e.contact) + '</td>' +
  '</tr>';
}

function toggleAccount(account) {
  if (expandedAccounts.has(account)) {
    expandedAccounts.delete(account);
  } else {
    expandedAccounts.add(account);
  }
  renderTable();
}

function expandAll() {
  var filtered = getFiltered();
  var groups = groupByAccount(filtered);
  groups.forEach(g => expandedAccounts.add(g.account));
  renderTable();
}

function collapseAll() {
  expandedAccounts.clear();
  renderTable();
}

function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Event listeners
document.querySelectorAll('#filter-product, #filter-sentiment').forEach(el => el.addEventListener('change', renderTable));
document.getElementById('search').addEventListener('input', renderTable);

// Group toggle
document.querySelectorAll('.seg__btn[data-group]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    groupBy = btn.dataset.group;
    document.querySelectorAll('.seg__btn[data-group]').forEach(b => b.setAttribute('data-active', 'false'));
    btn.setAttribute('data-active', 'true');
    renderTable();
  });
});

loadData();
</script>
</body>
</html>
