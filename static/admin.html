<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHERPA Admin</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300..800;1,300..800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/tokens.css">
<link rel="stylesheet" href="/static/components.css">
<link rel="stylesheet" href="/static/header.css">
<style>
/* Admin auth screen */
.admin-auth {
  max-width: 400px;
  margin: 80px auto;
  text-align: center;
}
.admin-auth .input {
  margin: 16px 0;
  width: 100%;
}
.admin-auth .input input {
  font-family: var(--font-mono);
}

/* Feature cards */
.feature-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 14px;
}
.feature-card h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 4px;
}
.feature-card .meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 12px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.feature-card .meta a { color: var(--brand-purple); text-decoration: none; }
.feature-card .meta a:hover { text-decoration: underline; }
.feature-card textarea {
  width: 100%;
  min-height: 70px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  resize: vertical;
  outline: none;
}
.feature-card textarea:focus { border-color: var(--brand-purple); box-shadow: var(--shadow-glow-purple); }
.feature-card .btn-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
.feature-card .status-msg { font-size: 12px; margin-left: 8px; display: none; align-items: center; }
.feature-card .status-msg.ok { color: var(--green); }
.feature-card .status-msg.err { color: var(--red); }
.no-desc {
  color: var(--amber);
  font-size: 12px;
  padding: 2px 8px;
  background: var(--tint-amber);
  border-radius: var(--radius-pill);
}

/* Table pills */
.pill {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: var(--radius-pill);
}
.pill-blocked { background: var(--tint-red); color: var(--red); }
.pill-active { background: var(--tint-green); color: var(--green); }
.pill-critical { background: var(--tint-red); color: var(--red); }
.pill-important { background: var(--tint-amber); color: var(--amber); }
.pill-nice_to_have { background: var(--tint-green); color: var(--green); }
</style>
<script>
(function(){var s=document.createElement('script');s.src='/rybbit/script.js';s.defer=true;
s.dataset.siteId=location.hostname.includes('staging')?'a0aeed07d55a':'7ecde10714bd';
document.head.appendChild(s);})();
</script>
</head>
<body>
<script src="/static/header.js"></script>

<main class="page page--wide">
  <!-- Auth screen -->
  <div id="authScreen" class="admin-auth">
    <div class="page-head" style="justify-content:center">
      <div class="page-head__title" style="align-items:center;text-align:center">
        <span class="t-eyebrow" style="color:var(--brand-purple)">Expedition control</span>
        <h1 class="t-display">Admin</h1>
        <p class="t-body">Enter admin key to continue</p>
      </div>
    </div>
    <div class="input" style="margin:16px 0">
      <input type="password" id="adminKeyInput" placeholder="Admin key" style="font-family:var(--font-mono)" onkeydown="if(event.key==='Enter')adminLogin()">
    </div>
    <button class="btn btn--primary" onclick="adminLogin()" style="width:100%">Sign in</button>
    <p id="adminError" style="color:var(--red);font-size:13px;margin-top:8px;display:none"></p>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none">
    <div class="page-head">
      <div class="page-head__title">
        <span class="t-eyebrow" style="color:var(--brand-purple)">Expedition control</span>
        <h1 class="t-display">Admin</h1>
      </div>
    </div>

    <div class="stat-grid" id="stats" style="margin-bottom:24px"></div>

    <div class="seg" style="margin-bottom:18px">
      <button class="seg__btn" data-active="true" data-tab="features" onclick="switchTab('features', this)">Features</button>
      <button class="seg__btn" data-tab="voters" onclick="switchTab('voters', this)">Voters</button>
      <button class="seg__btn" data-tab="votes" onclick="switchTab('votes', this)">Votes</button>
      <button class="seg__btn" data-tab="comments" onclick="switchTab('comments', this)">Comments</button>
    </div>

    <div id="tabContent"></div>
  </div>
</main>

<script>
let adminKey = '';
function adminHeaders() { return { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey }; }

async function adminLogin() {
  adminKey = document.getElementById('adminKeyInput').value;
  var err = document.getElementById('adminError');
  try {
    var resp = await fetch('/api/admin/voters', { headers: adminHeaders() });
    if (resp.status === 401) { err.textContent = 'Invalid admin key'; err.style.display = ''; return; }
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = '';
    sessionStorage.setItem('admin_key', adminKey);
    loadDashboard();
  } catch (e) { err.textContent = 'Connection error'; err.style.display = ''; }
}

var savedKey = sessionStorage.getItem('admin_key');
if (savedKey) { adminKey = savedKey; adminLogin(); }

async function loadDashboard() {
  var [voters, votes, comments, features] = await Promise.all([
    fetch('/api/admin/voters', { headers: adminHeaders() }).then(r => r.json()),
    fetch('/api/admin/votes', { headers: adminHeaders() }).then(r => r.json()),
    fetch('/api/admin/comments', { headers: adminHeaders() }).then(r => r.json()),
    fetch('/api/admin/features', { headers: adminHeaders() }).then(r => r.json()),
  ]);
  window._voters = voters; window._votes = votes; window._comments = comments; window._features = features;

  document.getElementById('stats').innerHTML =
    '<div class="stat"><span class="stat__label">Features</span><span class="stat__value">' + features.length + '</span></div>' +
    '<div class="stat"><span class="stat__label">Voters</span><span class="stat__value">' + voters.length + '</span></div>' +
    '<div class="stat"><span class="stat__label">Votes</span><span class="stat__value">' + votes.length + '</span></div>' +
    '<div class="stat"><span class="stat__label">Comments</span><span class="stat__value">' + comments.length + '</span></div>';
  switchTab('features', document.querySelector('.seg__btn[data-active="true"]'));
}

function switchTab(tab, btn) {
  document.querySelectorAll('.seg__btn[data-tab]').forEach(t => t.setAttribute('data-active', 'false'));
  btn.setAttribute('data-active', 'true');
  var content = document.getElementById('tabContent');
  if (tab === 'features') renderFeatures(content);
  else if (tab === 'voters') renderVoters(content);
  else if (tab === 'votes') renderVotes(content);
  else if (tab === 'comments') renderComments(content);
}

function renderVoters(el) {
  var data = window._voters || [];
  if (!data.length) { el.innerHTML = '<div class="surface" style="padding:40px;text-align:center;color:var(--text-muted)">No voters yet</div>'; return; }
  el.innerHTML = '<div class="table-wrap"><table class="table">' +
    '<thead><tr><th>Email</th><th>Name</th><th style="width:80px">Votes</th><th style="width:100px">Comments</th><th style="width:90px">Status</th><th style="width:120px">Last Active</th><th style="width:90px"></th></tr></thead>' +
    '<tbody>' + data.map(function(v) {
      var initials = (v.display_name || v.email || '?').split(/\s+/).map(w => w[0]).join('').substring(0, 2).toUpperCase();
      return '<tr>' +
        '<td><div style="display:flex;align-items:center;gap:10px"><span class="user-pill__avatar">' + esc(initials) + '</span>' +
          '<span style="font-family:var(--font-mono);font-size:12px">' + esc(v.email) + '</span></div></td>' +
        '<td>' + esc(v.display_name || '—') + '</td>' +
        '<td><span class="t-mono" style="font-weight:600">' + v.vote_count + '</span></td>' +
        '<td><span class="t-mono">' + v.comment_count + '</span></td>' +
        '<td>' + (v.is_blocked ? '<span class="pill pill-blocked">Blocked</span>' : '<span class="pill pill-active">Active</span>') + '</td>' +
        '<td style="font-size:12px;color:var(--text-muted)">' + (v.last_active_at ? new Date(v.last_active_at * 1000).toLocaleDateString() : '—') + '</td>' +
        '<td>' + (v.is_blocked
          ? '<button class="btn btn--subtle btn--sm" onclick="toggleBlock(' + v.id + ', false)">Unblock</button>'
          : '<button class="btn btn--subtle btn--sm" onclick="toggleBlock(' + v.id + ', true)">Block</button>') + '</td>' +
      '</tr>';
    }).join('') + '</tbody></table></div>';
}

function renderVotes(el) {
  var data = window._votes || [];
  if (!data.length) { el.innerHTML = '<div class="surface" style="padding:40px;text-align:center;color:var(--text-muted)">No votes yet</div>'; return; }
  el.innerHTML = '<div class="table-wrap"><table class="table">' +
    '<thead><tr><th>Email</th><th>Feature ID</th><th>Importance</th><th>Customer</th><th>Date</th><th style="width:90px"></th></tr></thead>' +
    '<tbody>' + data.map(function(v) {
      return '<tr>' +
        '<td style="font-family:var(--font-mono);font-size:12px">' + esc(v.email) + '</td>' +
        '<td style="font-family:var(--font-mono);font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + v.feature_id + '">' + v.feature_id.slice(0, 8) + '...</td>' +
        '<td><span class="pill pill-' + v.importance + '">' + v.importance.replace('_', ' ') + '</span></td>' +
        '<td>' + esc(v.customer_name || '—') + '</td>' +
        '<td style="font-size:12px;color:var(--text-muted)">' + new Date(v.created_at * 1000).toLocaleDateString() + '</td>' +
        '<td><button class="btn btn--subtle btn--sm" onclick="deleteVote(' + v.vote_id + ')">Remove</button></td>' +
      '</tr>';
    }).join('') + '</tbody></table></div>';
}

function renderComments(el) {
  var data = window._comments || [];
  if (!data.length) { el.innerHTML = '<div class="surface" style="padding:40px;text-align:center;color:var(--text-muted)">No comments yet</div>'; return; }
  el.innerHTML = '<div class="table-wrap"><table class="table">' +
    '<thead><tr><th>Email</th><th>Comment</th><th style="width:90px">Status</th><th style="width:110px">Date</th><th style="width:90px"></th></tr></thead>' +
    '<tbody>' + data.map(function(c) {
      return '<tr>' +
        '<td style="font-family:var(--font-mono);font-size:12px">' + esc(c.email) + '</td>' +
        '<td style="max-width:400px">' + esc(c.body) + '</td>' +
        '<td>' + (c.is_removed ? '<span class="pill pill-blocked">Removed</span>' : '<span class="pill pill-active">Visible</span>') + '</td>' +
        '<td style="font-size:12px;color:var(--text-muted)">' + new Date(c.created_at * 1000).toLocaleDateString() + '</td>' +
        '<td>' + (!c.is_removed ? '<button class="btn btn--subtle btn--sm" onclick="deleteComment(' + c.id + ')">Remove</button>' : '') + '</td>' +
      '</tr>';
    }).join('') + '</tbody></table></div>';
}

async function deleteVote(id) {
  if (!confirm('Remove this vote?')) return;
  await fetch('/api/admin/vote/' + id, { method: 'DELETE', headers: adminHeaders() });
  loadDashboard();
}
async function deleteComment(id) {
  if (!confirm('Remove this comment?')) return;
  await fetch('/api/admin/comment/' + id, { method: 'DELETE', headers: adminHeaders() });
  loadDashboard();
}
async function toggleBlock(voterId, block) {
  if (!confirm(block ? 'Block this voter? All votes & comments removed.' : 'Unblock this voter?')) return;
  await fetch('/api/admin/voter/' + voterId + '/block', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({ block: block }) });
  loadDashboard();
}

function renderFeatures(el) {
  var data = window._features || [];
  if (!data.length) { el.innerHTML = '<div class="surface" style="padding:40px;text-align:center;color:var(--text-muted)">No features found</div>'; return; }
  el.innerHTML = data.map(function(f) {
    var techBadges = f.db_tech.map(function(t) {
      var tc = TECH_COLORS[t] || { color: 'var(--brand-purple)', tint: 'rgba(110,63,243,0.10)' };
      return '<span class="tech-badge" style="--_color:' + tc.color + '; --_tint:' + tc.tint + '">' +
        '<svg viewBox="0 0 12 11" fill="none" class="tech-badge__tri"><path d="M6 1.2 11.2 9.8 H0.8 Z" stroke="' + tc.color + '" stroke-width="1.4" stroke-linejoin="round" fill="' + tc.color + '" fill-opacity="0.18"/></svg>' +
        t + '</span>';
    }).join('');
    var hasDesc = !!f.description;
    return '<div class="feature-card" id="fc-' + f.id + '">' +
      '<h3>' + esc(f.name) + '</h3>' +
      '<div class="meta">' +
        (techBadges ? '<span>' + techBadges + '</span>' : '') +
        '<span>' + f.votes + ' vote' + (f.votes !== 1 ? 's' : '') + '</span>' +
        '<span>' + f.comment_count + ' comment' + (f.comment_count !== 1 ? 's' : '') + '</span>' +
        (!hasDesc ? '<span class="no-desc">No description</span>' : '') +
      '</div>' +
      '<div class="t-eyebrow" style="margin-bottom:6px">SHERPA Description</div>' +
      '<textarea id="desc-' + f.id + '" placeholder="Click Generate to create a description from the Notion page content...">' + esc(f.description) + '</textarea>' +
      '<div class="btn-row">' +
        '<button class="btn btn--ghost btn--sm" onclick="generateDesc(\'' + f.id + '\')" id="gen-' + f.id + '">Generate from Notion</button>' +
        '<button class="btn btn--primary btn--sm" onclick="saveDesc(\'' + f.id + '\')" id="save-' + f.id + '">Save</button>' +
        '<span class="status-msg ok" id="msg-' + f.id + '">Saved</span>' +
        '<span class="status-msg err" id="err-' + f.id + '"></span>' +
      '</div>' +
    '</div>';
  }).join('');
}

async function generateDesc(featureId) {
  var feature = (window._features || []).find(f => f.id === featureId);
  if (!feature) return;
  var btn = document.getElementById('gen-' + featureId);
  var textarea = document.getElementById('desc-' + featureId);
  var errMsg = document.getElementById('err-' + featureId);
  errMsg.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Reading Notion page...';
  try {
    var resp = await fetch('/api/admin/generate-description/' + featureId, {
      method: 'POST', headers: adminHeaders(),
      body: JSON.stringify({ name: feature.name }),
    });
    var data = await resp.json();
    if (data.description) {
      textarea.value = data.description;
    } else if (data.error) {
      errMsg.textContent = data.error; errMsg.style.display = 'inline-flex';
    }
  } catch (e) {
    errMsg.textContent = 'Error: ' + e.message; errMsg.style.display = 'inline-flex';
  }
  btn.disabled = false; btn.textContent = 'Generate from Notion';
}

async function saveDesc(featureId) {
  var textarea = document.getElementById('desc-' + featureId);
  var btn = document.getElementById('save-' + featureId);
  var msg = document.getElementById('msg-' + featureId);
  var errMsg = document.getElementById('err-' + featureId);
  var description = textarea.value.trim();
  if (!description) { alert('Description cannot be empty'); return; }
  btn.disabled = true; errMsg.style.display = 'none'; msg.style.display = 'none';
  try {
    var resp = await fetch('/api/admin/save-description/' + featureId, {
      method: 'POST', headers: adminHeaders(),
      body: JSON.stringify({ description: description }),
    });
    var data = await resp.json();
    if (data.ok) {
      var f = (window._features || []).find(f => f.id === featureId);
      if (f) f.description = description;
      msg.style.display = 'inline-flex';
      setTimeout(function() { msg.style.display = 'none'; }, 3000);
    } else {
      errMsg.textContent = data.error || 'Save failed'; errMsg.style.display = 'inline-flex';
    }
  } catch (e) {
    errMsg.textContent = 'Error: ' + e.message; errMsg.style.display = 'inline-flex';
  }
  btn.disabled = false;
}

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
</script>
</body>
</html>
