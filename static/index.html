<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHERPA — Percona</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<link rel="preload" as="image" href="/static/logo-small.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300..800;1,300..800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/tokens.css">
<link rel="stylesheet" href="/static/components.css">
<link rel="stylesheet" href="/static/header.css">
<style>
/* ─── Portal Hero ─── */
.portal-hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1.4fr);
  gap: 1px;
  margin-bottom: 24px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.portal-hero__stats {
  background: var(--bg-card);
  padding: 20px 22px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: relative;
  overflow: hidden;
}
.portal-hero__stats .stat-grid-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 4px;
}
.portal-hero__stats .stat-item .t-eyebrow { margin-bottom: 4px; }
.portal-hero__stats .stat-item .big-num {
  font-family: var(--font-mono);
  font-size: 26px;
  font-weight: 650;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.portal-hero__stats .stat-item .sub-line {
  font-size: 11px;
  font-family: var(--font-mono);
}
.portal-hero__chart {
  background: var(--bg-card);
  padding: 20px 22px;
  display: none; /* hidden per instructions: skip chart */
}
/* When chart is hidden, make stats full-width */
.portal-hero--no-chart { grid-template-columns: 1fr; }

/* ─── Feature cards with gradient stripe on hover ─── */
.card--feature {
  position: relative;
  overflow: hidden;
  cursor: pointer;
}
.card--feature::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--brand-purple), var(--brand-yellow-deep));
  opacity: 0;
  transition: opacity 180ms;
}
.card--feature:hover::before { opacity: 1; }

/* ─── Importance bar (inline in old card layout) ─── */
.importance-bar-inline {
  display: flex; height: 4px; border-radius: 2px; overflow: hidden;
  background: rgba(255,255,255,0.04); margin-top: 14px;
}
[data-theme="light"] .importance-bar-inline { background: rgba(0,0,0,0.04); }

/* ─── Modal ─── */
.importance-picker { display: flex; gap: 8px; margin-bottom: 16px; }
.imp-option {
  flex: 1; padding: 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: transparent;
  cursor: pointer; transition: all var(--transition); text-align: center;
  font-family: inherit; color: var(--text-secondary); font-size: 12px; font-weight: 500;
}
.imp-option:hover { border-color: var(--border-brand); }
.imp-option.selected { border-width: 2px; }
.imp-option.sel-nice { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.08); }
.imp-option.sel-important { border-color: var(--amber); color: var(--amber); background: rgba(245,158,11,0.08); }
.imp-option.sel-critical { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.08); }
.imp-option .imp-emoji { font-size: 20px; display: block; margin-bottom: 4px; }

/* Comments */
.comments-section { margin-top: 24px; border-top: 1px solid var(--border); padding-top: 20px; }
.comments-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.comment-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
.comment-item:last-child { border-bottom: none; }
.comment-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; display: flex; justify-content: space-between; }
.comment-body { font-size: 13.5px; color: var(--text-secondary); line-height: 1.5; }
.comment-empty { font-size: 13px; color: var(--text-muted); padding: 16px 0; }
.comment-form { display: flex; gap: 8px; margin-top: 12px; }
.comment-form input { flex: 1; }
.comment-form button {
  font-family: inherit; font-size: 13px; font-weight: 500;
  padding: 8px 16px; border-radius: var(--radius-sm);
  border: 1px solid var(--brand-purple); background: var(--tint-purple);
  color: var(--brand-purple); cursor: pointer; white-space: nowrap;
  transition: all var(--transition);
}
.comment-form button:hover { background: color-mix(in oklab, var(--brand-purple) 16%, transparent); }

.loading-state, .error-state, .empty-state { text-align: center; padding: 80px 32px; color: var(--text-muted); }
.loading-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--brand-purple); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 768px) {
  .portal-hero { grid-template-columns: 1fr; }
  .portal-hero__stats .stat-grid-inner { grid-template-columns: 1fr 1fr; gap: 10px; }
  .importance-picker { flex-direction: column; }
}
</style>
<script>
(function(){var s=document.createElement('script');s.src='/rybbit/script.js';s.defer=true;
s.dataset.siteId=location.hostname.includes('staging')?'a0aeed07d55a':'7ecde10714bd';
document.head.appendChild(s);})();
</script>
</head>
<body>
<script src="/static/header.js"></script>

<main class="page" id="portalPage">
  <!-- Page head (injected by JS after data loads) -->
  <div id="pageHead"></div>

  <!-- Hero stats (injected by JS after data loads) -->
  <div id="heroSection"></div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <div class="seg">
      <button class="seg__btn" data-view="board" onclick="setView('board')">
        <svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="2" y="3" width="4" height="10" rx="1"/><rect x="7" y="3" width="3" height="6" rx="1"/><rect x="11" y="3" width="3" height="8" rx="1"/></svg>
        Board
      </button>
      <button class="seg__btn" data-view="ranked" onclick="setView('ranked')">
        <svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h10M3 8h7M3 12h4"/></svg>
        Ranked
      </button>
    </div>

    <div class="input search" style="width:260px">
      <svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="5"/><path d="m14 14-3-3"/></svg>
      <input id="searchInput" placeholder="Search features..." oninput="onSearch()">
      <span class="kbd" style="pointer-events:none">&#8984;K</span>
    </div>

    <div class="toolbar__sep"></div>

    <div class="input" style="width:168px">
      <svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 4h11l-4 5v4l-3-1V9l-4-5Z"/></svg>
      <select id="techFilter" onchange="activeTech = this.value; localStorage.setItem('sherpa_tech', this.value); updateOperatorsChip(); render()">
        <option value="all">All products</option>
      </select>
      <svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m4 6 4 4 4-4"/></svg>
    </div>
    <button class="chip" id="operatorsChip" style="display:none" onclick="toggleOperators()">
      <span class="chip__dot" style="background:var(--tech-kubernetes)"></span>
      <span id="operatorsChipLabel">Include Operators</span>
    </button>

    <div class="toolbar__sep"></div>

    <div class="toolbar__group" id="statusFilters">
      <button class="chip" data-active="true" data-filter="status" data-value="all">All statuses</button>
      <button class="chip" data-filter="status" data-value="In Progress"><span class="chip__dot" style="background:#005ED6"></span>In Progress</button>
      <button class="chip" data-filter="status" data-value="Planned"><span class="chip__dot" style="background:#A83FEF"></span>Planned</button>
      <button class="chip" data-filter="status" data-value="Under Consideration"><span class="chip__dot" style="background:#E89407"></span>Under Consideration</button>
      <button class="chip" data-filter="status" data-value="Shipped"><span class="chip__dot" style="background:#1FA23A"></span>Shipped</button>
    </div>
  </div>

  <!-- Filter info row -->
  <div id="filterInfo" style="display:none; align-items:center; gap:10px; font-size:12px; color:var(--text-muted); margin:-4px 0 14px; letter-spacing:0.02em">
    <span id="filterInfoText"></span>
    <button onclick="clearFilters()" style="background:transparent; border:none; padding:2px 6px; color:var(--brand-purple); font-size:12px; cursor:pointer; font-weight:500">Clear filters</button>
  </div>

  <!-- Board / ranked content -->
  <div id="board">
    <div class="loading-state" id="loading"><div class="loading-spinner"></div><p>Loading features...</p></div>
  </div>
</main>

<!-- Feature Detail Modal -->
<div class="modal-overlay" id="featureModal">
  <div class="modal" style="max-width:620px">
    <button class="modal-close" onclick="closeModal('featureModal')">&times;</button>
    <div id="featureModalContent"></div>
  </div>
</div>

<script>
let allFeatures = [];
let activeTech = localStorage.getItem('sherpa_tech') || 'all';
let includeOperators = localStorage.getItem('sherpa_include_operators') !== 'false'; // default true
let activeStatus = localStorage.getItem('sherpa_status') || 'all';
let searchQuery = localStorage.getItem('sherpa_search') || '';
let activeView = localStorage.getItem('sherpa_view') || 'board';
let rankSort = localStorage.getItem('sherpa_rankSort') || 'demand';
let rankSortDir = localStorage.getItem('sherpa_rankSortDir') || 'desc';

const STATUS_ORDER = ['In Progress', 'Planned', 'Under Consideration', 'Shipped'];
const STATUS_COLORS = {
  'In Progress': '#005ED6',
  'Planned': '#A83FEF',
  'Under Consideration': '#E89407',
  'Shipped': '#1FA23A'
};

const PRODUCT_DISPLAY = {
  'Percona Server for MySQL': 'MySQL',
  'PostgreSQL': 'PostgreSQL',
  'MongoDB': 'MongoDB',
  'Valkey': 'Valkey',
  'PMM': 'PMM',
  'Operators': 'Operators',
};
function productLabel(t) { return PRODUCT_DISPLAY[t] || t; }

function techBadgeHTML(tech) {
  var label = productLabel(tech);
  var tc = TECH_COLORS[label] || TECH_COLORS[tech] || { color: 'var(--brand-purple)', tint: 'rgba(110,63,243,0.10)' };
  var iconHTML = tc.icon
    ? '<img src="' + tc.icon + '" width="14" height="14" style="flex-shrink:0" alt="">'
    : '';
  return '<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;font-family:var(--font-mono);background:' + tc.tint + ';color:' + tc.color + ';white-space:nowrap">' +
    iconHTML + label + '</span>';
}

function statusPillHTML(status) {
  var c = STATUS_COLORS[status] || '#E89407';
  return '<span class="status-pill" style="background:color-mix(in oklab,' + c + ' 12%,transparent); color:' + c + '; border:1px solid color-mix(in oklab,' + c + ' 28%,transparent)">' +
    '<span class="status-pill__dot" style="background:' + c + '"></span>' + status + '</span>';
}

function fmtMRR(n) {
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(n >= 10000000 ? 0 : 1) + 'M';
  if (n >= 1000) return '$' + Math.round(n / 1000) + 'K';
  return '$' + n;
}

// Auth state comes from header.js
window.onAuthChange = function() { loadFeatures(); };

function headers() {
  var h = { 'Content-Type': 'application/json' };
  if (currentUser) h['X-Voter-Token'] = String(currentUser.voter_id);
  return h;
}

async function api(path, opts = {}) {
  var resp = await fetch(path, { ...opts, headers: { ...headers(), ...(opts.headers || {}) } });
  return resp.json();
}

// ─── Modals ───
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', (e) => { if (e.target === el) el.classList.remove('open'); });
});

// ─── Page head ───
function renderPageHead() {
  document.getElementById('pageHead').innerHTML = '';
}

// ─── Hero stats ───
function renderHero() {
  var totalVotes = allFeatures.reduce(function(s, f) { return s + f.votes; }, 0);
  var totalMRR = allFeatures.reduce(function(s, f) { return s + (f.market_mrr || 0); }, 0);
  var totalAccts = allFeatures.reduce(function(s, f) { return s + (f.market_customer_count || 0); }, 0);
  var totalEvidence = allFeatures.reduce(function(s, f) { return s + (f.market_evidence_count || 0); }, 0);
  var totalSignals = allFeatures.reduce(function(s, f) { return s + ((f.market_signals || []).length || 0); }, 0);

  document.getElementById('heroSection').innerHTML =
    '<div class="portal-hero portal-hero--no-chart">' +
      '<div class="portal-hero__stats">' +
        '<span class="t-eyebrow">Basecamp &middot; this week</span>' +
        '<div class="stat-grid-inner">' +
          '<div class="stat-item">' +
            '<div class="t-eyebrow" style="margin-bottom:4px">Votes cast</div>' +
            '<div class="big-num" style="font-family:var(--font-mono); font-size:26px; font-weight:650; letter-spacing:-0.02em">' + totalVotes + '</div>' +
            '<div style="font-size:11px; color:var(--green); font-family:var(--font-mono)">&#8593; active this week</div>' +
          '</div>' +
          '<div class="stat-item">' +
            '<div class="t-eyebrow" style="margin-bottom:4px">Pipeline at risk</div>' +
            '<div class="big-num" style="font-family:var(--font-mono); font-size:26px; font-weight:650; letter-spacing:-0.02em">' + fmtMRR(totalMRR) + '</div>' +
            '<div style="font-size:11px; color:var(--text-muted); font-family:var(--font-mono)">' + totalAccts + ' accounts</div>' +
          '</div>' +
          '<div class="stat-item">' +
            '<div class="t-eyebrow" style="margin-bottom:4px">Active signals</div>' +
            '<div class="big-num" style="font-family:var(--font-mono); font-size:26px; font-weight:650; letter-spacing:-0.02em">' + allFeatures.length + '</div>' +
            '<div style="font-size:11px; color:var(--amber); font-family:var(--font-mono)">' + allFeatures.filter(function(f){return f.status==="In Progress"}).length + ' in progress</div>' +
          '</div>' +
          '<div class="stat-item">' +
            '<div class="t-eyebrow" style="margin-bottom:4px">Evidence records</div>' +
            '<div class="big-num" style="font-family:var(--font-mono); font-size:26px; font-weight:650; letter-spacing:-0.02em">' + totalEvidence + '</div>' +
            '<div style="font-size:11px; color:var(--green); font-family:var(--font-mono)">&#8593; tracking</div>' +
          '</div>' +
        '</div>' +
        '<a href="/signals" style="display:inline-flex; align-items:center; gap:6px; color:var(--text-secondary); font-size:13px; font-weight:500; padding:4px 0; transition:180ms"' +
          ' onmouseover="this.style.color=\'var(--brand-purple)\'" onmouseout="this.style.color=\'var(--text-secondary)\'">' +
          'See all signals <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h10m-4-4 4 4-4 4"/></svg>' +
        '</a>' +
      '</div>' +
    '</div>';
}

// ─── Features ───
async function loadFeatures() {
  var board = document.getElementById('board');
  try {
    var data = await api('/api/features');
    if (data.error) throw new Error(data.error);
    allFeatures = data;

    renderPageHead();
    renderHero();

    // Populate product area filter dynamically
    var techSel = document.getElementById('techFilter');
    var techs = [...new Set(data.flatMap(f => f.db_tech))].sort();
    techSel.innerHTML = '<option value="all">All products</option>';
    techs.forEach(t => { var o = document.createElement('option'); o.value = t; o.textContent = productLabel(t); techSel.appendChild(o); });
    techSel.value = activeTech;
    updateOperatorsChip();

    // Restore saved filter states
    document.querySelectorAll('.chip[data-filter="status"]').forEach(b => {
      b.setAttribute('data-active', b.dataset.value === activeStatus);
    });
    if (searchQuery) document.getElementById('searchInput').value = searchQuery;

    // Sync view toggle
    document.querySelectorAll('.seg__btn[data-view]').forEach(b => {
      b.setAttribute('data-active', b.dataset.view === activeView);
    });

    render();
  } catch (err) {
    board.innerHTML = '<div class="error-state"><p>Failed to load features.</p><p style="margin-top:8px;font-size:13px;opacity:.6">' + esc(err.message) + '</p></div>';
  }
}

// DB products that have overlapping Operators features
var DB_PRODUCTS = ['MySQL', 'PostgreSQL', 'MongoDB', 'Percona Server for MySQL'];

function toggleOperators() {
  includeOperators = !includeOperators;
  localStorage.setItem('sherpa_include_operators', includeOperators);
  updateOperatorsChip();
  render();
}

function updateOperatorsChip() {
  var chip = document.getElementById('operatorsChip');
  var label = document.getElementById('operatorsChipLabel');
  var showChip = activeTech !== 'all' && DB_PRODUCTS.includes(activeTech);
  chip.style.display = showChip ? '' : 'none';
  if (showChip) {
    chip.setAttribute('data-active', includeOperators);
    label.textContent = includeOperators ? 'Operators included' : 'Operators excluded';
  }
}

function getFiltered() {
  return allFeatures.filter(f => {
    if (activeTech !== 'all') {
      var matchesTech = f.db_tech.includes(activeTech);
      var hasOperators = f.db_tech.includes('Operators');

      if (!includeOperators && hasOperators && activeTech !== 'Operators') {
        // Toggle is off: hide any feature tagged with Operators (unless filtering BY Operators)
        return false;
      }
      if (!matchesTech) {
        // Feature doesn't match selected tech - show only if it's an Operators feature and toggle is on
        if (includeOperators && hasOperators) {
          // keep it
        } else {
          return false;
        }
      }
    }
    if (activeStatus !== 'all' && f.status !== activeStatus) return false;
    if (searchQuery) {
      var q = searchQuery.toLowerCase();
      var haystack = (f.name + ' ' + (f.description || '') + ' ' + f.db_tech.join(' ')).toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

function render() {
  // Show/hide filter info
  var hasFilters = searchQuery || activeStatus !== 'all' || activeTech !== 'all';
  var filtered = getFiltered();
  var filterInfo = document.getElementById('filterInfo');
  if (hasFilters) {
    filterInfo.style.display = 'flex';
    document.getElementById('filterInfoText').innerHTML = '<b style="color:var(--text-secondary);font-weight:600">' + filtered.length + '</b> of ' + allFeatures.length + ' features';
  } else {
    filterInfo.style.display = 'none';
  }

  if (activeView === 'ranked') renderRanked();
  else renderBoard();
}

function renderBoard() {
  var board = document.getElementById('board');
  var filtered = getFiltered();

  var grouped = {};
  STATUS_ORDER.forEach(s => grouped[s] = []);
  filtered.forEach(f => { if (grouped[f.status]) grouped[f.status].push(f); });
  Object.values(grouped).forEach(arr => arr.sort((a, b) => b.votes - a.votes));

  var html = '';
  STATUS_ORDER.forEach(function(status) {
    var items = grouped[status];
    if (activeStatus !== 'all' && status !== activeStatus) return;
    if (!items.length && activeStatus === 'all') return;

    html += '<section>' +
      '<div class="section-head">' +
        '<span class="section-head__dot" style="background:' + (STATUS_COLORS[status] || '#E89407') + '"></span>' +
        '<span class="section-head__title">' + status + '</span>' +
        '<span class="section-head__count">' + items.length + '</span>' +
        '<span class="section-head__rule"></span>' +
      '</div>' +
      '<div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:var(--density-card-gap)">';

    if (items.length) {
      items.forEach(function(f, i) {
        html += '<div style="animation:fade-up 0.4s cubic-bezier(0.4,0,0.2,1) backwards; animation-delay:' + (i * 40) + 'ms">' + cardHTML(f) + '</div>';
      });
    } else {
      html += '<div style="padding:24px; text-align:center; color:var(--text-muted); font-size:13px; border:1px dashed var(--border); border-radius:var(--radius)">No features here.</div>';
    }

    html += '</div></section>';
  });

  board.innerHTML = html || '<div class="empty-state"><p>No features match the current filters.</p></div>';
}

function renderRanked() {
  var board = document.getElementById('board');
  var filtered = getFiltered();

  var sorted = [...filtered].sort(function(a, b) {
    var va, vb, result;
    if (rankSort === 'votes') { va = a.votes; vb = b.votes; }
    else if (rankSort === 'critical') { va = a.importance.critical; vb = b.importance.critical; }
    else if (rankSort === 'demand') { va = a.market_demand_score || 0; vb = b.market_demand_score || 0; }
    else if (rankSort === 'evidence') { va = a.market_evidence_count || 0; vb = b.market_evidence_count || 0; }
    else if (rankSort === 'name') { va = a.name.toLowerCase(); vb = b.name.toLowerCase(); return rankSortDir === 'asc' ? (va < vb ? -1 : 1) : (va > vb ? -1 : 1); }
    else if (rankSort === 'comments') { va = a.comment_count || 0; vb = b.comment_count || 0; }
    else { va = a.market_demand_score || 0; vb = b.market_demand_score || 0; }
    result = rankSortDir === 'desc' ? vb - va : va - vb;
    // Tiebreakers: evidence count → MRR → votes
    if (result === 0) result = (b.market_evidence_count || 0) - (a.market_evidence_count || 0);
    if (result === 0) result = (b.market_mrr || 0) - (a.market_mrr || 0);
    if (result === 0) result = (b.votes || 0) - (a.votes || 0);
    return result;
  });

  var html = '<div class="table-wrap"><table class="table">' +
    '<thead><tr>' +
      '<th style="width:56px">#</th>' +
      '<th>Feature</th>' +
      '<th style="width:110px" data-sortable="true" onclick="toggleRankSort(\'votes\')">Votes</th>' +
      '<th style="width:240px" data-sortable="true" onclick="toggleRankSort(\'demand\')">Market demand</th>' +
      '<th style="width:170px">Status</th>' +
      '<th style="width:60px"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H8l-3 2v-2H5a2 2 0 0 1-2-2V5Z"/></svg></th>' +
    '</tr></thead><tbody>';

  if (!sorted.length) {
    html += '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">No features match the current filters.</td></tr>';
  }

  sorted.forEach(function(f, i) {
    var badges = f.db_tech.slice(0, 3).map(techBadgeHTML).join('');
    var extra = f.db_tech.length > 3 ? '<span style="font-size:11px;color:var(--text-muted)">+' + (f.db_tech.length - 3) + '</span>' : '';
    var total = f.importance.critical + f.importance.important + f.importance.nice_to_have;
    var pc = function(v) { return total > 0 ? (v / total * 100).toFixed(1) : 0; };

    // Market demand bar with score
    var demandBar = '';
    var scoreColor = f.market_demand_score >= 80 ? 'var(--red)' : f.market_demand_score >= 50 ? 'var(--amber)' : 'var(--green)';
    if (f.market_demand_score > 0) {
      demandBar = '<div style="display:flex;align-items:center;gap:10px">' +
        '<span class="t-mono" style="font-size:16px;font-weight:700;color:' + scoreColor + ';min-width:32px">' + Math.round(f.market_demand_score) + '</span>' +
        '<div style="flex:1">' +
          '<div style="height:4px;background:var(--bg-muted);border-radius:999px;overflow:hidden">' +
            '<div style="height:100%;width:' + Math.min(100, f.market_demand_score) + '%;background:linear-gradient(90deg,var(--brand-purple),var(--brand-yellow-deep))"></div>' +
          '</div>' +
          '<div class="t-mono" style="font-size:11px;color:var(--text-muted);margin-top:3px" title="' +
            (f.market_mrr ? '$' + Math.round(f.market_mrr).toLocaleString() + ' total MRR at risk' : 'No MRR data') +
            ' across ' + (f.market_evidence_count || 0) + ' evidence records from ' + (f.market_customer_count || 0) + ' accounts">' +
            fmtMRR(f.market_mrr || 0) + ' &middot; ' + (f.market_evidence_count || 0) + ' evidence' +
          '</div>' +
        '</div></div>';
    } else {
      demandBar = '<span style="color:var(--text-muted);font-size:12px">No data</span>';
    }

    // Importance bar for votes column
    var impBar = '';
    if (total > 0) {
      impBar = '<div style="flex:1;max-width:50px"><div class="importance-bar"><div class="importance-bar__track">' +
        (f.importance.critical ? '<div class="importance-bar__seg importance-bar__seg--critical" style="width:' + pc(f.importance.critical) + '%"></div>' : '') +
        (f.importance.important ? '<div class="importance-bar__seg importance-bar__seg--important" style="width:' + pc(f.importance.important) + '%"></div>' : '') +
        (f.importance.nice_to_have ? '<div class="importance-bar__seg importance-bar__seg--nice" style="width:' + pc(f.importance.nice_to_have) + '%"></div>' : '') +
        '</div></div></div>';
    }

    html += '<tr data-clickable="true" onclick="openFeatureModal(\'' + f.id + '\')">' +
      '<td class="num" style="color:var(--text-muted);font-weight:600">' + String(i + 1).padStart(2, '0') + '</td>' +
      '<td>' +
        '<div style="display:flex;flex-direction:column;gap:6px;max-width:480px">' +
          '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">' + badges + extra + '</div>' +
          '<div style="font-weight:600;color:var(--text-primary)">' + esc(f.name) + '</div>' +
        '</div>' +
      '</td>' +
      '<td><div style="display:flex;align-items:center;gap:8px">' +
        '<span class="t-mono" style="font-weight:600;font-size:14px">' + f.votes + '</span>' +
        impBar +
      '</div></td>' +
      '<td>' + demandBar + '</td>' +
      '<td>' + statusPillHTML(f.status) + '</td>' +
      '<td class="num" style="color:var(--text-muted)">' + (f.comment_count || 0) + '</td>' +
    '</tr>';
  });

  html += '</tbody></table></div>';
  board.innerHTML = html;
}

function setView(view) {
  activeView = view;
  localStorage.setItem('sherpa_view', view);
  document.querySelectorAll('.seg__btn[data-view]').forEach(b => {
    b.setAttribute('data-active', b.dataset.view === view);
  });
  render();
}

function toggleRankSort(col) {
  if (rankSort === col) { rankSortDir = rankSortDir === 'desc' ? 'asc' : 'desc'; }
  else { rankSort = col; rankSortDir = col === 'name' ? 'asc' : 'desc'; }
  localStorage.setItem('sherpa_rankSort', rankSort);
  localStorage.setItem('sherpa_rankSortDir', rankSortDir);
  render();
}

function cardHTML(f) {
  var voted = !!f.my_vote;
  var badges = f.db_tech.map(techBadgeHTML).join('');
  var total = f.importance.critical + f.importance.important + f.importance.nice_to_have;

  var impBar = '';
  if (total > 0) {
    var pc = function(v) { return (v / total * 100).toFixed(1); };
    impBar = '<div class="importance-bar">' +
      '<div class="importance-bar__track">' +
        (f.importance.critical ? '<div class="importance-bar__seg importance-bar__seg--critical" style="width:' + pc(f.importance.critical) + '%"></div>' : '') +
        (f.importance.important ? '<div class="importance-bar__seg importance-bar__seg--important" style="width:' + pc(f.importance.important) + '%"></div>' : '') +
        (f.importance.nice_to_have ? '<div class="importance-bar__seg importance-bar__seg--nice" style="width:' + pc(f.importance.nice_to_have) + '%"></div>' : '') +
      '</div>' +
      '<div class="importance-bar__legend">' +
        (f.importance.critical ? '<span><i style="background:var(--vote-critical)"></i>' + f.importance.critical + '</span>' : '') +
        (f.importance.important ? '<span><i style="background:var(--vote-important)"></i>' + f.importance.important + '</span>' : '') +
        (f.importance.nice_to_have ? '<span><i style="background:var(--vote-nice)"></i>' + f.importance.nice_to_have + '</span>' : '') +
      '</div>' +
    '</div>';
  }

  var demandBar = '';
  if (f.market_evidence_count > 0) {
    demandBar = '<div class="demand-bar">' +
      '<div class="demand-bar__head"><span>Market demand</span><span class="demand-bar__score">' + Math.round(f.market_demand_score) + '</span></div>' +
      '<div class="demand-bar__track"><div class="demand-bar__fill" style="width:' + Math.min(100, f.market_demand_score) + '%"></div></div>' +
      '<div class="demand-bar__meta">' +
        '<span>' + (f.market_customer_count || 0) + ' accounts</span>' +
        '<span>' + fmtMRR(f.market_mrr || 0) + ' MRR</span>' +
        '<span>' + f.market_evidence_count + ' signals</span>' +
      '</div></div>';
  }

  return '<article class="card card--feature" onclick="openFeatureModal(\'' + f.id + '\')">' +
    '<div class="card__head">' +
      '<div style="display:flex;gap:6px;flex-wrap:wrap">' + badges + '</div>' +
      '<h3 class="card__title">' + esc(f.name) + '</h3>' +
      (f.description ? '<p class="card__desc">' + esc(f.description) + '</p>' : '') +
    '</div>' +
    impBar +
    demandBar +
    '<div class="card__footer">' +
      '<button class="vote-btn' + (voted ? '" data-voted="true"' : '"') + ' onclick="handleVote(\'' + f.id + '\', event)">' +
        '<span class="vote-btn__arrow"><svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 13V3M4 7l4-4 4 4"/></svg></span>' +
        '<span class="vote-btn__count">' + f.votes + '</span>' +
      '</button>' +
      '<div style="display:flex;align-items:center;gap:12px">' +
        '<span style="display:inline-flex;align-items:center;gap:4px;color:var(--text-muted);font-size:12px">' +
          '<svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H8l-3 2v-2H5a2 2 0 0 1-2-2V5Z"/></svg> ' + (f.comment_count || 0) +
        '</span>' +
      '</div>' +
    '</div>' +
  '</article>';
}

// ─── Voting ───
function handleVote(featureId, event) {
  event.stopPropagation();
  if (!currentUser) { openAuthModal(); return; }
  var feature = allFeatures.find(f => f.id === featureId);
  if (feature.my_vote) {
    removeVote(featureId);
  } else {
    openFeatureModal(featureId, true);
  }
}

async function submitVote(featureId) {
  var importance = document.getElementById('selImp').value;
  var customer = document.getElementById('customerInput')?.value?.trim() || '';
  var data = await api('/api/vote', {
    method: 'POST', body: JSON.stringify({ feature_id: featureId, importance: importance, customer_name: customer })
  });
  if (data.ok) { closeModal('featureModal'); loadFeatures(); }
}

async function removeVote(featureId) {
  var data = await api('/api/vote', { method: 'POST', body: JSON.stringify({ feature_id: featureId, action: 'remove' }) });
  if (data.ok) { closeModal('featureModal'); loadFeatures(); }
}

// ─── Feature Modal ───
async function openFeatureModal(featureId) {
  var feature = allFeatures.find(f => f.id === featureId);
  if (!feature) return;

  var badges = feature.db_tech.map(techBadgeHTML).join('');
  var voted = !!feature.my_vote;

  var voteSection = '';
  if (currentUser && !voted) {
    voteSection =
      '<div style="margin:20px 0">' +
        '<label style="display:block;font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">How important is this to you?</label>' +
        '<div class="importance-picker">' +
          '<button class="imp-option" onclick="pickImp(this,\'nice_to_have\',\'sel-nice\')"><span class="imp-emoji">&#128077;</span>Nice to have</button>' +
          '<button class="imp-option selected sel-important" onclick="pickImp(this,\'important\',\'sel-important\')"><span class="imp-emoji">&#11088;</span>Important</button>' +
          '<button class="imp-option" onclick="pickImp(this,\'critical\',\'sel-critical\')"><span class="imp-emoji">&#128293;</span>Critical</button>' +
        '</div>' +
        '<input type="hidden" id="selImp" value="important">' +
        '<div class="form-group">' +
          '<label style="display:block;font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Customer impacted <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>' +
          '<input class="form-input" type="text" id="customerInput" placeholder="e.g. Acme Corp, internal request...">' +
        '</div>' +
        '<button class="btn-primary" onclick="submitVote(\'' + feature.id + '\')" style="margin-top:12px">Submit vote</button>' +
      '</div>';
  } else if (currentUser && voted) {
    voteSection =
      '<div style="margin:20px 0;padding:14px;border-radius:var(--radius-sm);background:var(--tint-purple);border:1px solid var(--border-brand);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">' +
        '<div><span style="font-size:13px;color:var(--brand-purple)">&#10003; You voted: <strong>' + feature.my_vote.replace(/_/g, ' ') + '</strong></span>' +
          (feature.my_customer ? '<span style="font-size:12px;color:var(--text-muted);margin-left:8px">for ' + esc(feature.my_customer) + '</span>' : '') +
        '</div>' +
        '<button style="font-family:inherit;font-size:12px;padding:4px 12px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer" onclick="removeVote(\'' + feature.id + '\')">Remove vote</button>' +
      '</div>';
  } else {
    voteSection =
      '<div style="margin:20px 0"><button class="btn-primary" onclick="openAuthModal()">Sign in to vote</button></div>';
  }

  var total = feature.importance.critical + feature.importance.important + feature.importance.nice_to_have;
  var impStats = '';
  if (total > 0) {
    var pc = function(v) { return (v / total * 100).toFixed(0); };
    impStats =
      '<div style="margin-bottom:20px">' +
        '<div class="importance-bar"><div class="importance-bar__track" style="height:6px">' +
          (feature.importance.critical ? '<div class="importance-bar__seg importance-bar__seg--critical" style="width:' + pc(feature.importance.critical) + '%"></div>' : '') +
          (feature.importance.important ? '<div class="importance-bar__seg importance-bar__seg--important" style="width:' + pc(feature.importance.important) + '%"></div>' : '') +
          (feature.importance.nice_to_have ? '<div class="importance-bar__seg importance-bar__seg--nice" style="width:' + pc(feature.importance.nice_to_have) + '%"></div>' : '') +
        '</div></div>' +
        '<div class="importance-bar__legend" style="margin-top:8px">' +
          '<span><i style="background:var(--vote-critical)"></i>' + feature.importance.critical + ' critical</span>' +
          '<span><i style="background:var(--vote-important)"></i>' + feature.importance.important + ' important</span>' +
          '<span><i style="background:var(--vote-nice)"></i>' + feature.importance.nice_to_have + ' nice to have</span>' +
        '</div>' +
      '</div>';
  }

  document.getElementById('featureModalContent').innerHTML =
    '<h2 style="font-size:18px;font-weight:650;letter-spacing:-0.01em">' + esc(feature.name) + '</h2>' +
    (badges ? '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">' + badges + '</div>' : '') +
    '<p style="margin-top:12px;font-size:14px;color:var(--text-secondary);line-height:1.55">' + esc(feature.description) + '</p>' +
    '<div style="display:flex;align-items:center;gap:8px;margin-top:16px;margin-bottom:8px">' +
      '<span style="font-family:var(--font-mono);font-size:24px;font-weight:700">' + feature.votes + '</span>' +
      '<span style="font-size:13px;color:var(--text-muted)">vote' + (feature.votes !== 1 ? 's' : '') + '</span>' +
    '</div>' +
    impStats +
    voteSection +
    '<div class="comments-section">' +
      '<h3>Comments</h3>' +
      '<div id="commentsList"><div class="comment-empty">Loading comments...</div></div>' +
      (currentUser ?
        '<div class="comment-form">' +
          '<input class="form-input" id="commentInput" placeholder="Add a comment..." onkeydown="if(event.key===\'Enter\')postComment(\'' + feature.id + '\')">' +
          '<button onclick="postComment(\'' + feature.id + '\')">Post</button>' +
        '</div>'
      : '<p style="font-size:12px;color:var(--text-muted);margin-top:12px"><a href="#" onclick="openAuthModal();return false" style="color:var(--brand-purple)">Sign in</a> to comment.</p>') +
    '</div>';

  document.getElementById('featureModal').classList.add('open');
  loadComments(featureId);
}

function pickImp(btn, value, cls) {
  btn.parentNode.querySelectorAll('.imp-option').forEach(b => b.className = 'imp-option');
  btn.className = 'imp-option selected ' + cls;
  document.getElementById('selImp').value = value;
}

// ─── Comments ───
async function loadComments(featureId) {
  var data = await api('/api/comments/' + featureId);
  var container = document.getElementById('commentsList');
  if (!data.length) {
    container.innerHTML = '<div class="comment-empty">No comments yet. Be the first!</div>';
    return;
  }
  container.innerHTML = data.map(c =>
    '<div class="comment-item">' +
      '<div class="comment-meta"><span>' + esc(c.display_name) + '</span><span>' + timeAgo(c.created_at) + '</span></div>' +
      '<div class="comment-body">' + esc(c.body) + '</div>' +
    '</div>'
  ).join('');
}

async function postComment(featureId) {
  var input = document.getElementById('commentInput');
  var body = input.value.trim();
  if (!body) return;
  var data = await api('/api/comments', { method: 'POST', body: JSON.stringify({ feature_id: featureId, body: body }) });
  if (data.ok) {
    input.value = '';
    loadComments(featureId);
    var f = allFeatures.find(f => f.id === featureId);
    if (f) f.comment_count++;
    render();
  }
}

// ─── Search ───
function onSearch() {
  searchQuery = document.getElementById('searchInput').value.trim();
  localStorage.setItem('sherpa_search', searchQuery);
  render();
}

function clearFilters() {
  searchQuery = '';
  activeStatus = 'all';
  activeTech = 'all';
  document.getElementById('searchInput').value = '';
  document.getElementById('techFilter').value = 'all';
  localStorage.setItem('sherpa_search', '');
  localStorage.setItem('sherpa_status', 'all');
  localStorage.setItem('sherpa_tech', 'all');
  document.querySelectorAll('.chip[data-filter="status"]').forEach(b => {
    b.setAttribute('data-active', b.dataset.value === 'all');
  });
  render();
}

// ─── Status Filters ───
document.getElementById('statusFilters').addEventListener('click', function(e) {
  var btn = e.target.closest('.chip[data-filter]');
  if (!btn) return;
  document.querySelectorAll('.chip[data-filter="status"]').forEach(b => b.setAttribute('data-active', 'false'));
  btn.setAttribute('data-active', 'true');
  activeStatus = btn.dataset.value;
  localStorage.setItem('sherpa_status', btn.dataset.value);
  render();
});

// ─── Helpers ───
function timeAgo(ts) {
  var diff = Date.now() / 1000 - ts;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  if (diff < 2592000) return Math.floor(diff / 86400) + 'd ago';
  return new Date(ts * 1000).toLocaleDateString();
}

loadFeatures();
</script>
</body>
</html>
